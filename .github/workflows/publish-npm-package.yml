name: Publish NPM Package Workflow

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch reference from the calling workflow'
        required: true
        type: string
      package_path:
        description: 'Path to the NPM package directory (optional)'
        required: false
        type: string
        default: '.'
      package_name:
        description: 'Name of the NPM package (used for version check)'
        required: true
        type: string
      node_version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      aws_region:
        description: 'AWS Region'
        required: false
        type: string
        default: 'us-east-1'
      run_tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      test_environment_variables:
        description: 'Environment variables to set during testing (JSON format)'
        required: false
        type: string
        default: '{}'
      test_environment_secrets:
        description: 'Secret environment variables to set during testing (JSON format with secret values)'
        required: false
        type: string
        default: '{}'
    secrets:
      aws_access_key_id_dev:
        description: 'AWS Access Key ID for Dev'
        required: true
      aws_secret_access_key_dev:
        description: 'AWS Secret Access Key for Dev'
        required: true
      aws_access_key_id_prod:
        description: 'AWS Access Key ID for Prod'
        required: true
      aws_secret_access_key_prod:
        description: 'AWS Secret Access Key for Prod'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.package_path }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}  # Refers to the calling repository
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
      
      - name: Configure npm authentication
        run: |
          cat > .npmrc << EOF
          @commercesong:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF
      
      - name: Clean AWS_PROFILE from environment files
        run: |
          echo "Cleaning AWS_PROFILE from environment files..."
          find "." -type f \( -name "*.env" -o -name ".env*" \) -print0 | while IFS= read -r -d '' file; do
            echo "Processing file: $file"
            echo -e "\nBefore cleaning, file contents:"
            cat "$file"
            temp_file=$(mktemp)
            grep -v "^AWS_PROFILE=" "$file" > "$temp_file" || true
            mv "$temp_file" "$file"
            echo -e "\nAfter cleaning, file contents:"
            cat "$file"
            echo -e "\nCleaned AWS_PROFILE from $file"
          done
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ inputs.ref == 'refs/heads/main' && secrets.aws_access_key_id_prod || secrets.aws_access_key_id_dev }}
          aws-secret-access-key: ${{ inputs.ref == 'refs/heads/main' && secrets.aws_secret_access_key_prod || secrets.aws_secret_access_key_dev }}
          aws-region: ${{ inputs.aws_region }}
      
      - name: Run tests
        if: inputs.run_tests
        env: 
          AWS_ENV: ${{ inputs.ref == 'refs/heads/main' && 'prod' || 'dev' }}
          # LIMITATION: GitHub Actions doesn't support truly generic secret passing to reusable workflows
          # We tried to make this generic but this is as close as we can get within GitHub constraints
          # 
          # When calling workflows use "secrets: inherit", all repository secrets become available
          # However, they must be explicitly listed here to be available as environment variables
          # 
          # TO ADD A NEW SECRET: Any repository needing additional test secrets must:
          # 1. Add the secret line here: NEW_SECRET: ${{ secrets.NEW_SECRET }}
          # 2. Configure NEW_SECRET as a repository secret in their GitHub Actions settings
          # 3. Secrets without values will be empty strings (won't cause errors)
          VM_MCP_TOKEN: ${{ secrets.VM_MCP_TOKEN }}
          VM_AUTH_TOKEN: ${{ secrets.VM_AUTH_TOKEN }}
          AA_ENGINE_VM_MCP_TOKEN: ${{ secrets.AA_ENGINE_VM_MCP_TOKEN }}
          AA_ENGINE_VM_AUTH_TOKEN: ${{ secrets.AA_ENGINE_VM_AUTH_TOKEN }}
        run: |
          # Set environment variables from the JSON input
          if [ -n "${{ inputs.test_environment_variables }}" ]; then
            env_vars=$(echo '${{ inputs.test_environment_variables }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"')
            for env_var in $env_vars; do
              export "$env_var"
            done
          fi
          
          # Set secret environment variables from the JSON input
          if [ -n "${{ inputs.test_environment_secrets }}" ]; then
            secret_env_vars=$(echo '${{ inputs.test_environment_secrets }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"')
            for secret_env_var in $secret_env_vars; do
              export "$secret_env_var"
            done
          fi
          npm test

  publish:
    needs: test
    if: inputs.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.package_path }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}  # Refers to the calling repository
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: 'https://npm.pkg.github.com'
      
      - name: Configure npm authentication
        run: |
          cat > .npmrc << EOF
          @commercesong:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check version increment
        run: |
          LATEST_VERSION=$(npm view @commercesong/${{ inputs.package_name }} version || echo "0.0.0")
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$(printf '%s\n' "$LATEST_VERSION" "$CURRENT_VERSION" | sort -V | head -n1)" = "$CURRENT_VERSION" ]; then
            echo "Error: Current version ($CURRENT_VERSION) must be greater than latest published version ($LATEST_VERSION)"
            exit 1
          fi
      
      # DEBUG: Uncomment the section below if authentication issues arise again
      # 
      # Key insight: When debugging GitHub Actions reusable workflow authentication issues,
      # "Re-run failed jobs" vs "Re-run all jobs" can behave differently. The official GitHub
      # documentation states that "Re-running failed jobs or a specific job in a workflow will 
      # use the reusable workflow from the same commit SHA of the first attempt" while 
      # "Re-running all jobs in a workflow will use the reusable workflow from the specified 
      # reference." This difference in behavior has been observed by multiple users in the 
      # community, where rerunning all jobs (including successful test jobs) resolves 
      # authentication issues that persist when only rerunning failed jobs. This may be due 
      # to differences in how GitHub Actions handles workflow context, dependency resolution, 
      # or authentication token refresh between the two rerun modes.
      #
      # - name: Debug npm configuration
      #   run: |
      #     echo "=== NPM Configuration Debug ==="
      #     echo "Current .npmrc contents:"
      #     cat .npmrc || echo "No .npmrc file found"
      #     echo ""
      #     echo "NPM registry configuration:"
      #     npm config list
      #     echo ""
      #     echo "Testing authentication:"
      #     npm whoami --registry=https://npm.pkg.github.com || echo "Authentication test failed"
      
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publishing package..."
          npm publish --verbose 